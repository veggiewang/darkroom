name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-ARM64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-Intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare ExifTool Sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/bin
          VERSION="13.10" # 使用一个极其稳定的已知版本
          
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            # Windows: 增加 User-Agent 伪装，从官方或镜像下载
            echo "Downloading ExifTool for Windows..."
            curl -A "Mozilla/5.0" -L "https://exiftool.org/exiftool-$VERSION.zip" -o exiftool.zip || \
            curl -L "https://github.com/veggiewang/darkroom/releases/download/v0.0.1/exiftool-$VERSION.zip" -o exiftool.zip # 备选
            
            unzip exiftool.zip
            mv "exiftool(-k).exe" "src-tauri/bin/exiftool-${{ matrix.target }}.exe"
          else
            # Mac/Linux: 直接从 GitHub 获取源码包，速度快且稳定
            echo "Downloading ExifTool Source from GitHub..."
            curl -L "https://github.com/exiftool/exiftool/archive/refs/tags/$VERSION.tar.gz" -o exiftool.tar.gz
            
            tar -xzf exiftool.tar.gz
            cd "exiftool-$VERSION"
            
            # 创建包装器脚本
            printf "#!/bin/bash\nPERL5LIB=\"\$(dirname \"\$0\")/exiftool_data/lib\" perl \"\$(dirname \"\$0\")/exiftool_data/exiftool\" \"\$@\"\n" > ../src-tauri/bin/exiftool-${{ matrix.target }}
            chmod +x ../src-tauri/bin/exiftool-${{ matrix.target }}
            
            mkdir -p ../src-tauri/bin/exiftool_data
            cp -r exiftool lib ../src-tauri/bin/exiftool_data/
            cd ..
          fi

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'Digital Darkroom ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: |
            ## 📦 下载安装包
            
            | 平台 | 文件 |
            |------|------|
            | 🍎 macOS (Apple Silicon) | `.dmg` |
            | 🍎 macOS (Intel) | `.dmg` |
            | 🪟 Windows | `.msi` / `.exe` |
            | 🐧 Linux | `.deb` / `.AppImage` |
            
            ## 🆕 更新内容
            
            - 胶片 EXIF 元数据批量写入（高性能集成版）
            - 内嵌 ExifTool，无需配置环境变量
            - 修复了 CI 编译过程中的下载源稳定性问题
            
            ---
            
            > 首次使用请查看 [README](https://github.com/veggiewang/darkroom#readme)
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
