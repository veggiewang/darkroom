name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-ARM64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-Intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare ExifTool Sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/bin
          # 定义下载地址（使用 13.25 版本作为示例，你可以更新为最新版）
          VERSION="13.25"
          
          if [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            # Windows: 下载 EXE 并解压
            curl -L "https://exiftool.org/exiftool-$VERSION.zip" -o exiftool.zip
            unzip exiftool.zip
            mv exiftool\(-k\).exe src-tauri/bin/exiftool-${{ matrix.target }}.exe
          elif [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            # MacOS: 直接使用内置的 perl 环境包装好的版本
            # 这里下载已编译好的二进制（如果官方没有直接二进制，通常使用 perl 脚本封装）
            # 为简单起见，我们从一个可靠的第三方二进制源下载或直接下载源码
            curl -L "https://exiftool.org/Image-ExifTool-$VERSION.tar.gz" -o exiftool.tar.gz
            tar -xzf exiftool.tar.gz
            cd Image-ExifTool-$VERSION
            # 将核心脚本打包成一个伪二进制（实质上是调用系统 perl）
            echo '#!/bin/bash' > ../src-tauri/bin/exiftool-${{ matrix.target }}
            echo 'perl "$(dirname "$0")/exiftool_data/exiftool" "$@"' >> ../src-tauri/bin/exiftool-${{ matrix.target }}
            chmod +x ../src-tauri/bin/exiftool-${{ matrix.target }}
            mkdir -p ../src-tauri/bin/exiftool_data
            cp -r exiftool lib ../src-tauri/bin/exiftool_data/
            cd ..
          else
            # Linux: 同 Mac 处理
            curl -L "https://exiftool.org/Image-ExifTool-$VERSION.tar.gz" -o exiftool.tar.gz
            tar -xzf exiftool.tar.gz
            cd Image-ExifTool-$VERSION
            echo '#!/bin/bash' > ../src-tauri/bin/exiftool-${{ matrix.target }}
            echo 'perl "$(dirname "$0")/exiftool_data/exiftool" "$@"' >> ../src-tauri/bin/exiftool-${{ matrix.target }}
            chmod +x ../src-tauri/bin/exiftool-${{ matrix.target }}
            mkdir -p ../src-tauri/bin/exiftool_data
            cp -r exiftool lib ../src-tauri/bin/exiftool_data/
            cd ..
          fi

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'Digital Darkroom ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: |
            ## 📦 下载安装包
            
            | 平台 | 文件 |
            |------|------|
            | 🍎 macOS (Apple Silicon) | `.dmg` |
            | 🍎 macOS (Intel) | `.dmg` |
            | 🪟 Windows | `.msi` / `.exe` |
            | 🐧 Linux | `.deb` / `.AppImage` |
            
            ## 🆕 更新内容
            
            - 胶片 EXIF 元数据批量写入
            - 支持 135/120 多种胶卷型号
            - 暗房工作台可视化编辑
            
            ---
            
            > 首次使用请查看 [README](https://github.com/veggiewang/darkroom#readme)
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
