<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!-- Background: rounded dark square -->
  <rect width="1024" height="1024" rx="220" fill="#09090b"/>
  
  <!-- Subtle radial glow behind canister -->
  <radialGradient id="bg-glow" cx="50%" cy="45%" r="40%">
    <stop offset="0%" stop-color="#facc15" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="220" fill="url(#bg-glow)"/>

  <!-- Film Canister - centered, larger and clearer -->
  <g transform="translate(512,460) scale(6.8) translate(-50,-50)">
    <!-- 3D Drop Shadow -->
    <ellipse cx="50" cy="87" rx="28" ry="8" fill="rgba(0,0,0,0.7)" />

    <!-- Main Body -->
    <rect x="25" y="20" width="50" height="60" rx="2" fill="#1a1a1a" />
    
    <!-- Extruding Lip - more pronounced -->
    <path d="M73 35 L85 36 L85 64 L73 65 Z" fill="#111" />
    
    <!-- Film Strip peeking out - darker, more visible -->
    <path d="M85 38 L100 39 L100 61 L85 62 Z" fill="#4a3728" opacity="1" />
    <!-- Sprockets - larger and more visible -->
    <rect x="88" y="42" width="4" height="4" fill="#222" transform="skewY(10)" />
    <rect x="88" y="49" width="4" height="4" fill="#222" transform="skewY(10)" />
    <rect x="88" y="56" width="4" height="4" fill="#222" transform="skewY(10)" />

    <!-- Brand Label Area - Kodak-style gold to red gradient -->
    <rect x="25" y="32" width="50" height="36" fill="url(#label-grad)" />
    
    <!-- Subtle label texture lines -->
    <line x1="25" y1="40" x2="75" y2="40" stroke="rgba(0,0,0,0.15)" stroke-width="0.5"/>
    <line x1="25" y1="48" x2="75" y2="48" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
    <line x1="25" y1="56" x2="75" y2="56" stroke="rgba(0,0,0,0.15)" stroke-width="0.5"/>

    <!-- Label Text - optimized for small screens -->
    <text x="50" y="44" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="6.5" font-weight="900" fill="#000" text-anchor="middle" letter-spacing="0.3" opacity="0.85">
      DARK
    </text>
    <text x="50" y="53" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="6.5" font-weight="900" fill="#000" text-anchor="middle" letter-spacing="0.3" opacity="0.85">
      ROOM
    </text>

    <!-- Lighting/Reflection - more visible -->
    <rect x="30" y="20" width="4" height="60" fill="white" opacity="0.14" />
    <rect x="65" y="20" width="6" height="60" fill="black" opacity="0.3" />

    <!-- Top Cap -->
    <ellipse cx="50" cy="20" rx="25" ry="7" fill="#d0d0d0" />
    <ellipse cx="50" cy="18.5" rx="23" ry="5.5" fill="#f0f0f0" />
    <ellipse cx="50" cy="18.5" rx="15" ry="3" fill="#b0b0b0" />
    <!-- Nipple/Spool - larger -->
    <rect x="43" y="8" width="14" height="10" rx="1.5" fill="#c0c0c0" />
    <ellipse cx="50" cy="8" rx="7" ry="2.5" fill="#e8e8e8" />

    <!-- Bottom Cap -->
    <ellipse cx="50" cy="80" rx="25" ry="7" fill="#b0b0b0" />
    <path d="M25 80 Q 50 87 75 80 L 75 78 Q 50 85 25 78 Z" fill="#909090" />
  </g>

  <defs>
    <linearGradient id="label-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
</svg>
