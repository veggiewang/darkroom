<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Canister Body -->
  <rect x="25" y="20" width="50" height="60" rx="4" fill="#2A2A2A" stroke="#1A1A1A" stroke-width="2"/>
  
  <!-- Metallic Ends (Top and Bottom caps) -->
  <ellipse cx="50" cy="20" rx="25" ry="8" fill="#D4D4D4" stroke="#888888" stroke-width="1.5"/>
  <ellipse cx="50" cy="80" rx="25" ry="8" fill="#D4D4D4" stroke="#888888" stroke-width="1.5"/>
  
  <!-- Extruding Lip (Film exit slot) -->
  <path d="M75 35 L85 35 L85 65 L75 65 Z" fill="#1A1A1A"/>
  
  <!-- Film Strip peeking out -->
  <path d="M85 38 L95 38 L95 62 L85 62 Z" fill="#905A40" opacity="0.8"/>
  <circle cx="90" cy="42" r="1.5" fill="#1A1A1A"/>
  <circle cx="90" cy="50" r="1.5" fill="#1A1A1A"/>
  <circle cx="90" cy="58" r="1.5" fill="#1A1A1A"/>

  <!-- Brand Label Wrapper -->
  <rect x="25" y="30" width="50" height="40" fill="url(#brandGradient)"/>
  <text x="50" y="55" font-family="monospace" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">ISO 400</text>
  
  <defs>
    <!-- Dynamic gradient you can override in React or CSS -->
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB000"/>
      <stop offset="100%" stop-color="#E03000"/>
    </linearGradient>
  </defs>
</svg>
